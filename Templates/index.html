<!DOCTYPE html>
<html>
<head>
    <title>Port Scanner</title>
</head>
<body style="background:black; color:white; text-align:center;">

<h1>🔐 Network Port Scanner</h1>

<form method="POST">
    <input type="text" name="target" placeholder="Enter IP or Website">
    <button type="submit">Scan</button>
</form>

{% for item in result %}
<p>Port: {{item.port}} | Risk: {{item.risk}}</p>
{% endfor %}

</body>
</html>
